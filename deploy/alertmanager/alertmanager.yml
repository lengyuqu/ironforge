# IronForge Alertmanager Configuration
# Phase 22-C: Observability Stack

global:
  resolve_timeout: 5m

# Route tree
route:
  receiver: 'default'
  group_by: ['alertname', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 4h
  routes:
    # Critical alerts → PagerDuty
    - match_re:
        severity: 'critical'
      receiver: 'pagerduty'
      group_wait: 10s
      repeat_interval: 1h
      continue: true

    # Warning alerts → Slack
    - match_re:
        severity: 'warning'
      receiver: 'slack'
      group_wait: 1m
      repeat_interval: 4h
      continue: true

    # Info alerts → low-priority Slack channel
    - match_re:
        severity: 'info'
      receiver: 'slack-info'
      group_wait: 5m
      repeat_interval: 24h

# Receivers
receivers:
  - name: 'default'
    webhook_configs:
      - url: 'http://localhost:5001/alerts'
        send_resolved: true

  - name: 'pagerduty'
    pagerduty_configs:
      - service_key: '<PAGERDUTY_SERVICE_KEY>'  # Set via env or secret
        send_resolved: true
        severity: 'critical'
        description: '{{ .GroupLabels.alertname }} - {{ .CommonAnnotations.summary }}'

  - name: 'slack'
    slack_configs:
      - api_url: '<SLACK_WEBHOOK_URL>'  # Set via env or secret
        channel: '#ironforge-alerts'
        send_resolved: true
        title: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          *Summary:* {{ .Annotations.summary }}
          *Description:* {{ .Annotations.description }}
          *Severity:* {{ .Labels.severity }}
          *Service:* {{ .Labels.service }}
          {{ end }}

  - name: 'slack-info'
    slack_configs:
      - api_url: '<SLACK_WEBHOOK_URL>'  # Set via env or secret
        channel: '#ironforge-info'
        send_resolved: false
        title: '[INFO] {{ .GroupLabels.alertname }}'
        text: |
          {{ range .Alerts }}
          {{ .Annotations.description }}
          {{ end }}

# Inhibition rules (suppress noisy alerts)
inhibit_rules:
  # If IronForge is down, suppress all other alerts
  - source_match:
      alertname: 'IronForgeDown'
    target_match_re:
      service: 'ironforge'
    equal: ['service']

  # If a specific route is slow, suppress generic "high latency" alerts
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['service', 'route']
